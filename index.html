<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trenton O'Bannon</title>
  <style>
    :root {
      --bg: #0e1116;
      --fg: #e6edf3;
      --muted: #8b949e;
      --accent: #58a6ff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--fg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    main {
      max-width: 640px;
      text-align: center;
    }
    h1 {
      font-size: clamp(2rem, 6vw, 3.5rem);
      margin: 0 0 0.5rem;
      letter-spacing: -0.02em;
    }
    p {
      color: var(--muted);
      font-size: 1.1rem;
      line-height: 1.6;
      margin: 0 0 2rem;
    }
    a {
      color: var(--accent);
      text-decoration: none;
    }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <main>
    <h1>Trenton O'Bannon</h1>
    <p>Welcome. This site is under construction — more soon.</p>
  </main>
</body>
</html>
